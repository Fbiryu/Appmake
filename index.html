<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ここいる Presence</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <span id="room-label"></span>
    <button id="share">Share</button>
  </header>
  <main>
    <canvas id="canvas"></canvas>
    <p id="status" aria-live="polite"></p>
  </main>
  <nav id="vibes" aria-label="vibe picker">
    <button class="vibe" data-vibe="calm" aria-label="calm"></button>
    <button class="vibe" data-vibe="sunny" aria-label="sunny"></button>
    <button class="vibe" data-vibe="deep" aria-label="deep"></button>
    <button class="vibe" data-vibe="free" aria-label="free"></button>
  </nav>
  <script src="script.js"></script>
</body>
</html>
